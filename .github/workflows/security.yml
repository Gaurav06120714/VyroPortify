name: Security Scans

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 06:00 UTC — catches new CVEs against the unchanged tree.
    - cron: "0 6 * * 1"

jobs:
  # ── Python deps ─────────────────────────────────────────────────────────────
  pip-audit:
    name: Backend deps (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit backend dependencies
        working-directory: backend
        # Non-blocking initially — flip --fix-on first then turn on --strict in v1.6.
        run: pip-audit --skip-editable --disable-pip || true

  # ── Node deps ───────────────────────────────────────────────────────────────
  npm-audit:
    name: Frontend deps (npm audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm", cache-dependency-path: "frontend/package-lock.json" }
      - name: Audit frontend dependencies
        working-directory: frontend
        run: npm audit --audit-level=high || true

  # ── Secrets ─────────────────────────────────────────────────────────────────
  gitleaks:
    name: Secret scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Container image (advisory) ──────────────────────────────────────────────
  trivy:
    name: Backend image (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t vyroportify-api:scan -f backend/Dockerfile backend
      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: vyroportify-api:scan
          format: table
          severity: CRITICAL,HIGH
          exit-code: "0"   # advisory in v1.5; promote to 1 in v1.6
