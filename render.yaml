databases:
  - name: vyroportify-db
    plan: free          # 90-day expiry — migrate or upgrade before then
    databaseName: portifyai
    user: vyroportify

envVarGroups:
  - name: vyroportify-shared
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PROXY_DEPTH
        value: "1"
      - key: SECRET_KEY
        generateValue: true
      - key: CLERK_JWKS_URL
        sync: false
      - key: CLERK_WEBHOOK_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRO_PRICE_ID
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

services:
  - type: keyvalue
    name: vyroportify-redis
    plan: free
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

  # Single web service runs BOTH uvicorn (foreground) and the Celery worker
  # (background) — Render free has no separate "worker" type, so we wedge
  # them into one container via start.sh. Concurrency lowered to 1 to fit
  # 512 MB RAM on the free plan.
  - type: web
    name: vyroportify-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -e . && alembic upgrade head
    startCommand: bash start.sh
    healthCheckPath: /api/v1/health/ready
    envVars:
      - fromGroup: vyroportify-shared
      - key: DATABASE_URL
        fromDatabase:
          name: vyroportify-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: vyroportify-redis
          type: keyvalue
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: vyroportify-redis
          type: keyvalue
          property: connectionString
