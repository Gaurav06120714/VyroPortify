databases:
  - name: vyroportify-db
    plan: free
    databaseName: portifyai
    user: vyroportify

# Shared environment variables — referenced by both the API and the worker.
envVarGroups:
  - name: vyroportify-shared
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PROXY_DEPTH
        value: "1"
      - key: SECRET_KEY
        generateValue: true
      # Paste these in Render dashboard after the group is created
      - key: CLERK_JWKS_URL
        sync: false
      - key: CLERK_WEBHOOK_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRO_PRICE_ID
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

services:
  - type: keyvalue
    name: vyroportify-redis
    plan: free
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

  - type: web
    name: vyroportify-api
    runtime: python
    plan: starter
    rootDir: backend
    buildCommand: pip install -e . && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health/ready
    envVars:
      - fromGroup: vyroportify-shared
      - key: DATABASE_URL
        fromDatabase:
          name: vyroportify-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: vyroportify-redis
          type: keyvalue
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: vyroportify-redis
          type: keyvalue
          property: connectionString

  - type: worker
    name: vyroportify-worker
    runtime: python
    plan: starter
    rootDir: backend
    buildCommand: pip install -e .
    startCommand: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    envVars:
      - fromGroup: vyroportify-shared
      - key: DATABASE_URL
        fromDatabase:
          name: vyroportify-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: vyroportify-redis
          type: keyvalue
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: vyroportify-redis
          type: keyvalue
          property: connectionString
